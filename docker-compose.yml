services:
  db:
    image: postgres:16
    container_name: agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_db"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pg_data: